<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Trinkets and Things</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <h1>Trinkets & Things</h1>
                <p>Admin Dashboard</p>
            </div>
            <nav class="admin-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a></li>
                    <li class="active"><a href="products.html"><i class="fas fa-box-open"></i> Products</a></li>
                    <li><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>
        </aside>
        
        <main class="admin-main">
            <header class="admin-header">
                <h2>Manage Products</h2>
                <div class="admin-actions">
                    <button id="add-product-btn" class="btn"><i class="fas fa-plus"></i> Add Product</button>
                    <button id="import-products-btn" class="btn outline"><i class="fas fa-file-import"></i> Import</button>
                    <button id="export-products-btn" class="btn outline"><i class="fas fa-file-export"></i> Export</button>
                </div>
                <div class="admin-user">
                    <span>Welcome, Admin</span>
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>
            
            <div class="admin-content">
                <div class="products-filters">
                    <div class="filter-group">
                        <label for="product-search">Search:</label>
                        <input type="text" id="product-search" placeholder="Product name or SKU">
                    </div>
                    <div class="filter-group">
                        <label for="product-category">Category:</label>
                        <select id="product-category">
                            <option value="all">All Categories</option>
                            <!-- Categories will be loaded dynamically -->
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="product-status">Status:</label>
                        <select id="product-status">
                            <option value="all">All Status</option>
                            <option value="in-stock">In Stock</option>
                            <option value="out-of-stock">Out of Stock</option>
                            <option value="featured">Featured</option>
                        </select>
                    </div>
                </div>
                
                <div class="products-table-container">
                    <table id="products-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>SKU</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Products will be loaded here -->
                        </tbody>
                    </table>
                </div>
                
                <div class="pagination">
                    <button id="prev-page-products" disabled><i class="fas fa-chevron-left"></i></button>
                    <span id="page-info-products">Page 1 of 1</span>
                    <button id="next-page-products" disabled><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Product Modal -->
    <div class="modal" id="product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Product</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="product-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-name">Product Name</label>
                            <input type="text" id="product-name" required>
                        </div>
                        <div class="form-group">
                            <label for="product-sku">SKU</label>
                            <input type="text" id="product-sku" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-price">Price (₹)</label>
                            <input type="number" id="product-price" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="product-sale-price">Sale Price (₹)</label>
                            <input type="number" id="product-sale-price" step="0.01">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-stock">Stock Quantity</label>
                            <input type="number" id="product-stock" required>
                        </div>
                        <div class="form-group">
                            <label for="product-colors">Colors</label>
                            <select id="product-colors" multiple>
                                <option value="Red">Red</option>
                                <option value="Blue">Blue</option>
                                <option value="Green">Green</option>
                                <option value="Gold">Gold</option>
                                <option value="Silver">Silver</option>
                                <option value="Black">Black</option>
                                <option value="White">White</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="product-description">Description</label>
                        <textarea id="product-description" rows="4"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="product-images">Product Images</label>
                        <input type="file" id="product-images" multiple accept="image/*">
                        <div class="image-preview" id="image-preview">
                            <!-- Image previews will appear here -->
                        </div>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="product-featured">
                        <label for="product-featured">Featured Product</label>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn">Save Product</button>
                        <button type="button" class="btn outline cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="import-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Import Products</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="import-instructions">
                    <p>Upload a CSV file with product data. <a href="#" id="download-template">Download template</a></p>
                    <p>Required fields: Name, Price, Stock</p>
                </div>
                <form id="import-form">
                    <div class="form-group">
                        <label for="import-file">CSV File</label>
                        <input type="file" id="import-file" accept=".csv" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn">Import Products</button>
                        <button type="button" class="btn outline cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
